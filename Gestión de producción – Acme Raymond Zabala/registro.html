<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ACME - Crear Cuenta</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div>
        <h2>Formulario de Registro Nuevo</h2>
        <p>Completa tus datos para crear tu cuenta y acceder directamente al sistema.</p>
        
        <form id="registroForm">
            <div>
                <label>Número de Identificación</label>
                <input type="text" id="regIdNum" required>
            </div>
            <div>
                <label>Nombre Completo</label>
                <input type="text" id="regName" required>
            </div>
            <div>
                <label>Cargo asignado</label>
                <select id="regRole">
                    <option value="Administrador">Administrador</option>
                    <option value="Operario">Operario</option>
                    <option value="Supervisor">Supervisor</option>
                </select>
            </div>
            <div>
                <label>Contraseña</label>
                <input type="password" id="regPass" required>
            </div>
            <div>
                <label>Confirmar Contraseña</label>
                <input type="password" id="regPassConfirm" required>
            </div>
            <button type="submit">Registrarse e Ingresar</button>
        </form>
        
        <div style="margin-top: 15px;">
            <a href="index.html">Volver al Login</a>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/registro.js"></script>
</body>
</html>
